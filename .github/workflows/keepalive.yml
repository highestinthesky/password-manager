name: Supabase keep-alive

# Free Supabase projects pause after ~1 week of inactivity.
# A tiny authenticated-ish ping every 3 days counts as activity.
# Set repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY
# (Settings → Secrets and variables → Actions)

on:
  schedule:
    - cron: "17 9 */3 * *" # every 3 days, 09:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL secret not set — skipping"; exit 0
          fi
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/vaults?select=user_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
          echo "pinged OK"
